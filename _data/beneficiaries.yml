- name: "Nadir Said Velasquez Gutierrez"
  image: "/assets/img/beneficiaries/nadir-velasquez.jpg"
  comment: >
    Disfrutaba mucho asistir a las actividades de Ciudad del Arte con mi abuela.
    Me encantaba porque podía dibujar, jugar y conocí a un niño que se volvió mi amigo.
    Cada día era divertido, aunque hubo uno que no me gustó tanto: el día que nos tocó bailar cumbia.

- name: "Sharon Villada Franco"
  image: "/assets/img/beneficiaries/sharon-villada.jpg"
  comment: >
    Fue muy divertido hacer un instrumento musical. La pasé muy bien.
    Siempre compartía con los demás niños y aprendíamos cosas nuevas.

- name: "Santiago Anillo Anillo"
  image: "/assets/img/beneficiaries/santiago-anillo.jpg"
  comment: >
    Me gustó la experiencia de participar como cantante en el evento de cierre de CIUDAD DEL ARTE,
    porque pude expresarme cantando para más personas, para que lo disfrutaran, se inspiraran
    y se animaran con las canciones.

- name: "Juan Esteban Castro Perez"
  image: "/assets/img/beneficiaries/juan-castro.jpg"
  comment: >
    Lo que más me gusto de Ciudad del Arte fueron las meriendas, la música y los juegos
    y me gustaría volver a asistir a las actividades.

- name: "Edinson Javier Camaño De Moya"
  image: "/assets/img/beneficiaries/edinson-camano.jpg"
  comment: >
    Hola, mi nombre es Edinson Javier, les quiero dar las gracias por todas las actividades,
    en cada una de ellas vivimos momentos agradables. Lo que más me gusto fue que pintamos,
    cantamos y jugamos mucho, también me gustaron las obras de teatro, porque nos dejan enseñanzas.
    Espero volver a compartir con todos ustedes pronto.

- name: "Lucie Vivien Carlier Jassir"
  image: "/assets/img/beneficiaries/lucie-carlier.jpg"
  comment: >
    Hola mi nombre es Lucie Carlier, empezaré diciendo que estoy super agradecida por haber sido
    parte de la comunidad Ciudad del Arte, desde el momento que me uní supe que estaba en el lugar
    correcto, la oportunidad de explorar mis pasiones y descubrir nuevos talentos, ha sido
    verdaderamente transformadora. Me encantó pintar, tocar instrumentos, cantar y actuar, fue
    emocionante ver cómo podía expresarme de manera creativa y confiar en mi. Además, aprender a
    rimar y cantar fue genial. Me permitió conectar con otros chicos de manera más profunda y hacer
    muchos amigos. Lo que más me gusta de la Fundación es el ambiente seguro y acogedor que ha
    creado el equipo, es increíblemente apasionado y comprometido con brindar oportunidades a
    personas como yo. Me siento muy afortunada de aprender de ellos.
