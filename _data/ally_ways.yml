- name: "Aporta recursos económicos"
  description: "Ayuda a financiar proyectos que brindan acceso a la educación artística y social."
- name: "Donaciones materiales"
  description: "Colabora con instrumentos, materiales de arte, libros y otros recursos educativos."
- name: "Ofrece tu tiempo y talento"
  description: "Si tienes conocimientos en arte, música o educación, puedes aportar como voluntario."
- name: "Comparte nuestra causa"
  description: "Difunde nuestras iniciativas en tus redes para aumentar el impacto de los proyectos."
- name: "Patrocina actividades o eventos"
  description: "Haz posible que más personas participen en nuestros talleres, conciertos y actividades."
- name: "Súmate como aliado institucional"
  description: "Si representas a una organización, podemos diseñar una alianza a la medida de tu causa."
