<section class="section" id="gallery" style="background:var(--cream);">
  <div class="wrap">
    <div class="section-head">
      <div>
        <div class="eyebrow">Galería</div>
        <h2 style="margin-top:20px">Momentos de comunidad.</h2>
      </div>
      <div class="lede">
        Fragmentos del día a día en los barrios donde trabajamos: ensayos, murales, merienda compartida, presentaciones y risas.
      </div>
    </div>

    <div class="gallery">
      {% for g in site.data.gallery %}
      <div class="g {{ g.slug }}"><div class="ph">[ {{ g.caption }} ]</div></div>
      {% endfor %}
    </div>
  </div>
</section>
