<section class="donate" id="donate">
  <div class="sticker"></div>
  <div class="wrap">
    <div class="donate-grid">
      <div>
        <div class="eyebrow">Apóyanos</div>
        <h2>Tu donación se convierte en <span class="serif-italic">pinceles, cuerdas y futuro.</span></h2>
      </div>
      <div>
        <p>Con una donación recurrente sostenemos los talleres gratuitos y el material para los niños y niñas que participan cada sábado en Ciudad del Arte.</p>

        <div class="amounts" id="amounts">
          <button class="amount" data-amount="30">$30.000 <small>COP / mes</small></button>
          <button class="amount selected" data-amount="60">$60.000 <small>COP / mes</small></button>
          <button class="amount" data-amount="120">$120.000 <small>COP / mes</small></button>
        </div>

        <div class="donate-cta-row">
          <a class="btn btn-yellow" href="{{ site.donations_online_url }}" target="_blank" rel="noopener noreferrer">Donar ahora <span class="arrow">→</span></a>
          <a class="btn btn-ghost" href="{{ site.contact.whatsapp_url }}" target="_blank" rel="noopener noreferrer" style="color:var(--cream); border-color: rgba(255,255,255,0.3)">Donar por WhatsApp</a>
        </div>
      </div>
    </div>
  </div>
</section>
