<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description"
  content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500;1,700;1,800&display=swap"
  rel="stylesheet">

<link href="{{ '/assets/css/styles.css' | relative_url }}" rel="stylesheet">
{% if page.custom_css %}
{% for css in page.custom_css %}
<link href="{{ css | relative_url }}" rel="stylesheet">
{% endfor %}
{% endif %}

{% feed_meta %}
{% seo %}
