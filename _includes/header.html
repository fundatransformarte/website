<header class="site">
  <div class="wrap">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/img/logo.png' | relative_url }}" alt="Logo de {{ site.title }}">
      <div class="brand-text">
        <div class="name">TransformArte</div>
        <div class="sub">Fundación Multiactiva</div>
      </div>
    </a>

    <button class="nav-toggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="main-nav">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="primary" id="main-nav">
      {% for item in site.navigation %}
      {% assign item_url_trailing = item.url | append: '/' %}
      {% if page.url == item.url or page.url == item_url_trailing %}
      <a href="{{ item.url | relative_url }}" class="nav-active" aria-current="page">{{ item.title }}</a>
      {% else %}
      <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endif %}
      {% endfor %}
    </nav>

    <div class="header-cta">
      <a class="btn btn-ghost" href="{{ site.volunteer_form }}" target="_blank" rel="noopener noreferrer">Ser voluntario</a>
      <a class="btn btn-primary" href="{{ site.donations_online_url }}" target="_blank" rel="noopener noreferrer">
        Donar <span class="arrow">→</span>
      </a>
    </div>
  </div>
</header>
