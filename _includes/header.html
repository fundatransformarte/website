<header>
  <div class="container">
    <div class="header-content">
      <a href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/img/logo.png' | relative_url }}" alt="logo foundation" class="logo">
      </a>
      <nav>
        <ul>
          {% for item in site.navigation %}
          <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </div>
</header>
